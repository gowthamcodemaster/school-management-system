#===============================
# Redis configuration file
# Optimized for development environment with production-like settings
#===============================

# Network Settings
bind 0.0.0.0
protected-mode no
port 6379
timeout 300

# General Settings
daemonize no
supervised no
loglevel notice

# Persistence Settings
save 900 1
save 300 10
save 60 10000

appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Performance Settings
slowlog-log-slower-than 10000
slowlog-max-len 128

