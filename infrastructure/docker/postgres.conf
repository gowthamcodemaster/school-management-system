#====================================================
# PostgreSQL configuration file
#Optimized for development environment with production-like settings
#====================================================

# Connection Settings
listen_addresses = '*'          # Listen on all interfaces
max_connections = 100          # Maximum number of connections
superuser_reserved_connections = 3

# Memory Settings
shared_buffers = 256MB         # Memory for shared buffers
effective_cache_size = 768MB   # Effective cache size
work_mem = 16MB                # Memory for internal sort operations
maintenance_work_mem = 128MB     # Memory for maintenance operations

#Query Planning Settings
random_page_cost = 1.1         # Cost of a non-sequential page fetch
effective_io_concurrency = 200 # Number of concurrent I/O operations

# WAL Settings
wal_level = replica            # Level of information written to WAL
synchronous_commit = on        # Ensure transactions are fully committed
max_wal_size = 1GB            # Maximum size of WAL files
min_wal_size = 80MB            # Minimum size of WAL files
checkpoint_completion_target = 0.7 # Target for checkpoint completion

# Logging Settings
logging_collector = on         # Enable logging collector
log_directory = 'log'      # Directory for log files
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log' # Log file name pattern
log_statement = 'all'          # Log all DDL statements
log_duration = on             # Log duration of each completed statement
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h ' # Log line prefix format
log_lock_waits = on          # Log long lock waits
log_min_duration_statement = 1000 # Log statements that run longer than 500ms

# Performance Settings
shared_preload_libraries = 'pg_stat_statements' # Load pg_stat_statements extension

# Autovacuum Settings
autovacuum = on                # Enable autovacuum
autovacuum_max_workers = 3       # Maximum number of autovacuum workers
autovacuum_naptime = 1min      # Time between autovacuum runs

# Locale and Encoding
lc_messages = 'en_US.UTF-8'   # Locale for messages
lc_monetary = 'en_IN'  # Locale for monetary formatting
lc_numeric = 'en_IN'   # Locale for numeric formatting
lc_time = 'en_IN'      # Locale for time formatting
timezone = 'Asia/Kolkata'            # Time zone

# Client Connection Defaults
client_encoding = 'UTF8'     # Client encoding
