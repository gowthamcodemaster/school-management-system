# School Management System - Database Infrastructure
version: '3.9'

#Define networks (isolate services)
networks:
  school_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  
#Define volumes (persist data)
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  pgadmin-data:
    driver: local

services:
  #PostgreSQL 16- Primary Database
  postgres:
    image: postgres:16-alpine
    container_name: school_postgres
    restart: unless-stopped
   
    #Environmental variables for DB setup
    environment:
      #DB Credentials
      POSTGRES_USER: ${POSTGRES_USER:-school_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword123}
      POSTGRES_DB: ${POSTGRES_DB:-school_management_db}
   
      # Performance Tuning
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 768MB
      POSTGRES_WORK_MEM: 16MB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB

      #Logging
      POSTGRES_LOGGING_COLLECTOR: "on"
      POSTGRES_LOG_STATEMENT: "all"
      POSTGRES_LOG_DURATION: "on"

      #Timezone
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata

    #ports mapping
    ports:
      - "5432:5432"
    
    #volume mapping
    volumes:
    #Data persistence
      - postgres-data:/var/lib/postgresql/data
    #Custom config
      - ./postgres.conf:/etc/postgresql/postgresql.conf
    #Initialization scripts
      - ./init-scripts:/docker-entrypoint-initdb.d
    #Backup storage
      - ./db/data/backups:/backups

  #Heath Check for PostgreSQL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-school_admin} -d ${POSTGRES_DB:-school_management_db}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  #Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2048M
        reservations:
          cpus: '1'
          memory: 512M

    networks:
      - school_network

    #Command to use custom config
    command: postgres -c config_file=/etc/postgresql/postgresql.conf

  #Redis Cache Server
  redis:
    image: redis:7
    container_name: school_redis
    restart: unless-stopped

    #ports mapping
    ports:
      - "6379:6379"

    #volume mapping
    volumes:
      - redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf

  #Health Check for Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    #Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

    networks:
      - school_network

    #Command to use custom config
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]

  #BULLMQ Redis Adapter for Job Queue Management
  bull-board:
    image: deadly0/bull-board
    container_name: school_bull_board
    restart: unless-stopped

    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BULL_PREFIX: "bull"

    #ports mapping
    ports:
      - "3001:3000"

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - school_network
  
  #pgAdmin 4 - Database Management Tool
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: school_pgadmin
    restart: unless-stopped

    #Environmental variables for pgAdmin setup
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-gowthamsway1995@gmail.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-adminpassword123}
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_COFIG_MASTER_PASSWORD_REQUIRED: "False"

    #ports mapping
    ports:
      - "5050:80"

    #volume mapping
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - school_network

  # PgBouncer - Connection Pooler for PostgreSQL
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: school_pgbouncer
    restart: unless-stopped

    #Environmental variables for PgBouncer setup
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-school_admin}:${POSTGRES_PASSWORD:-securepassword123}@postgres:5432/${POSTGRES_DB:-school_management_db}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
      RESERVE_POOL_SIZE: 5
      RESERVED_POOL_TIMEOUT: 3

    #ports mapping
    ports:
      - "6432:5432"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - school_network

  #Database Backup Service (Automated)
  backup:
    image: postgres:16-alpine
    container_name: school_db_backup
    restart: unless-stopped

    #Environmental variables for Backup setup
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-school_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword123}
      POSTGRES_DB: ${POSTGRES_DB:-school_management_db}
      POSTGRES_HOST: postgres
      BACKUP_SCHEDULE: "0 2 * * *"  # Daily at 2 AM
      BACKUP_RETENTION_DAYS: 7
      BACKUP_RETENTION_WEEKS: 4
      BACKUP_RETENTION_MONTHS: 6

    #volume mapping
    volumes:
      - ./data/backups:/backups
      - ../scripts/backup.sh:/backup.sh

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - school_network

    #Command to run backup script
    entrypoint: /bin/sh
    command: >
      sh -c "
      apk add --no-cache postgresql-client bash tzdata &&
      cp /usr/share/zoneinfo/Asia/Kolkata /etc/localtime &&
      echo 'Asia/Kolkata' > /etc/timezone &&
      while true; do
        echo 'Starting backup...';
        PGPASSWORD=$$POSTGRES_PASSWORD pg_dump -h postgres -U $$POSTGRES_USER $$POSTGRES_DB | gzip > /backups/backup_$$(date +'%Y%m%d_%H%M%S').sql.gz;
        echo 'Backup completed.';
        find /backups -type f -name '*.sql.gz' -mtime +$$BACKUP_RETENTION_DAYS -exec rm {} \;;
        sleep 86400;
      done
      "